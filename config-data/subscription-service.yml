server:
  port: 8105

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/fluxus_subscription?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

authorization:
  jwt:
    secret: fluxusbackenddevsecretkeyfluxusbackenddevsecret
    expiration-milliseconds: 86400000

services:
  companies:
    base-url: http://localhost:8101

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
