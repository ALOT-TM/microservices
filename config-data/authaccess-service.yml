server:
  port: 8094
  error:
    include-message: always
    include-binding-errors: always

spring:
  datasource:
    url: jdbc:h2:mem:fluxus_authaccess;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    use-root-path: true
    display-request-duration: true
    try-it-out-enabled: true

authorization:
  jwt:
    secret: fluxusbackenddevsecretkeyfluxusbackenddevsecret
    expiration-milliseconds: 86400000

security:
  bcrypt:
    rounds: 4

services:
  retail-company:
    base-url: http://localhost:8101
  beneficiary:
    base-url: http://localhost:8102

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true
